name: Build PromptFlow Studio

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:

  build-linux:
    name: Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86-64
            runner: ubuntu-22.04
            eb_arch: x64
          - arch: arm64
            runner: ubuntu-22.04-arm
            eb_arch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Linux packaging deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y fakeroot dpkg rpm

      - name: Install fpm via Ruby gem (avoids wrong-arch binary from electron-builder)
        run: |
          sudo gem install fpm --no-document
          fpm --version

      - name: Generate icon
        run: |
          python3 -c "
          import os, struct, zlib
          def png(size):
              img=[]
              cx,cy=size//2,size//2
              r=size//2-2
              s=size/256
              for y in range(size):
                  row=[]
                  for x in range(size):
                      dx,dy=x-cx,y-cy
                      ib=abs(dx)<r-int(8*s) and abs(dy)<r-int(8*s)
                      ox,oy=x-(cx-int(r*0.5)),y-(cy-int(r*0.5))
                      ip=(int(20*s)<ox<int(36*s) and int(24*s)<oy<int(80*s)) or (int(20*s)<ox<int(60*s) and int(24*s)<oy<int(42*s)) or (int(44*s)<ox<int(60*s) and int(42*s)<oy<int(58*s))
                      if_=(int(70*s)<ox<int(86*s) and int(24*s)<oy<int(80*s)) or (int(70*s)<ox<int(110*s) and int(24*s)<oy<int(38*s)) or (int(70*s)<ox<int(100*s) and int(50*s)<oy<int(58*s))
                      if ib:
                          if ip: row+=[124,108,252,255]
                          elif if_: row+=[200,195,255,255]
                          else: row+=[13,13,18,255]
                      else: row+=[0,0,0,0]
                  img.append(bytes(row))
              def ch(n,d): c=zlib.crc32(n+d)&0xffffffff; return struct.pack('>I',len(d))+n+d+struct.pack('>I',c)
              raw=b''.join(b'\x00'+r for r in img)
              ih=struct.pack('>IIBBBBB',size,size,8,6,0,0,0)
              return b'\x89PNG\r\n\x1a\n'+ch(b'IHDR',ih)+ch(b'IDAT',zlib.compress(raw,9))+ch(b'IEND',b'')
          os.makedirs('electron/assets',exist_ok=True)
          open('electron/assets/icon.png','wb').write(png(512))
          print('icon.png written')
          "

      - name: Install dependencies
        run: npm install

      - name: Build Vite bundle
        run: npm run build:vite
        env:
          NODE_ENV: production

      - name: Build AppImage
        run: npx electron-builder --linux AppImage --${{ matrix.eb_arch }} --publish never

      - name: Build deb
        run: USE_SYSTEM_FPM=true npx electron-builder --linux deb --${{ matrix.eb_arch }} --publish never

      - name: Build rpm (x86-64 only)
        if: matrix.arch == 'x86-64'
        run: USE_SYSTEM_FPM=true npx electron-builder --linux rpm --x64 --publish never

      - name: List output
        run: ls -lh dist-electron/

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          arch=${{ matrix.arch == 'x86-64' && 'amd64' || 'arm64' }}
          find dist-electron -maxdepth 1 -name "*.AppImage" -exec cp {} release-artifacts/PromptFlow-main-${arch}.AppImage \;
          find dist-electron -maxdepth 1 -name "*.deb"      -exec cp {} release-artifacts/PromptFlow-main-${arch}.deb \;
          if [ "${{ matrix.arch }}" = "x86-64" ]; then
            find dist-electron -maxdepth 1 -name "*.rpm" -exec cp {} release-artifacts/PromptFlow-main-x86_64.rpm \;
          fi
          ls -lh release-artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: release-artifacts/*
          retention-days: 7

  build-windows:
    name: Windows (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            filename: PromptFlow-Setup-main-x64.exe
          - arch: arm64
            filename: PromptFlow-Setup-main-arm64.exe
          - arch: ia32
            filename: PromptFlow-Setup-main-ia32.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate icon.ico
        shell: python
        run: |
          import os, struct, zlib
          def png(size):
              img=[]
              cx,cy=size//2,size//2
              r=size//2-2
              s=size/256
              for y in range(size):
                  row=[]
                  for x in range(size):
                      dx,dy=x-cx,y-cy
                      ib=abs(dx)<r-int(8*s) and abs(dy)<r-int(8*s)
                      ox,oy=x-(cx-int(r*0.5)),y-(cy-int(r*0.5))
                      ip=(int(20*s)<ox<int(36*s) and int(24*s)<oy<int(80*s)) or (int(20*s)<ox<int(60*s) and int(24*s)<oy<int(42*s)) or (int(44*s)<ox<int(60*s) and int(42*s)<oy<int(58*s))
                      if_=(int(70*s)<ox<int(86*s) and int(24*s)<oy<int(80*s)) or (int(70*s)<ox<int(110*s) and int(24*s)<oy<int(38*s)) or (int(70*s)<ox<int(100*s) and int(50*s)<oy<int(58*s))
                      if ib:
                          if ip: row+=[124,108,252,255]
                          elif if_: row+=[200,195,255,255]
                          else: row+=[13,13,18,255]
                      else: row+=[0,0,0,0]
                  img.append(bytes(row))
              def ch(n,d): c=zlib.crc32(n+d)&0xffffffff; return struct.pack('>I',len(d))+n+d+struct.pack('>I',c)
              raw=b''.join(b'\x00'+r for r in img)
              ih=struct.pack('>IIBBBBB',size,size,8,6,0,0,0)
              return b'\x89PNG\r\n\x1a\n'+ch(b'IHDR',ih)+ch(b'IDAT',zlib.compress(raw,9))+ch(b'IEND',b'')
          os.makedirs('electron/assets', exist_ok=True)
          sizes=[16,32,48,256]
          pngs=[(s,png(s)) for s in sizes]
          count=len(pngs)
          header=struct.pack('<HHH',0,1,count)
          dir_offset=6+count*16
          entries=b''; images=b''; offset=dir_offset
          for size,data in pngs:
              w=size if size<256 else 0; h=w
              entries+=struct.pack('<BBBBHHII',w,h,0,0,1,32,len(data),offset)
              images+=data; offset+=len(data)
          ico=header+entries+images
          open('electron/assets/icon.ico','wb').write(ico)
          open('electron/assets/icon.png','wb').write(png(512))
          print(f'ICO: {len(ico)} bytes, PNG: written')

      - name: Install dependencies
        run: npm install

      - name: Build Vite bundle
        run: npm run build:vite
        env:
          NODE_ENV: production

      - name: Build NSIS installer
        run: npx electron-builder --win nsis --${{ matrix.arch }} --publish never

      - name: List output
        run: Get-ChildItem dist-electron\ | Format-Table Name, Length
        shell: pwsh

      - name: Collect artifact
        shell: bash
        run: |
          mkdir -p release-artifacts
          find dist-electron -maxdepth 1 -name "*.exe" -exec cp {} release-artifacts/${{ matrix.filename }} \;
          ls -lh release-artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: release-artifacts/${{ matrix.filename }}
          retention-days: 7

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - run: ls -lh release-artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          name: PromptFlow Studio ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}