name: Build PromptFlow Studio

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:

  build-linux:
    name: Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    environment: Build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86-64
            runner: ubuntu-22.04
            eb_arch: x64
          - arch: arm64
            runner: ubuntu-22.04-arm
            eb_arch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check Secrets
        shell: bash
        run: |
          echo "Checking secret presence (lengths only)..."
          echo "API_KEY length: ${#VAL}"
          echo "PROJECT_ID length: ${#ID}"
        env:
          VAL: ${{ secrets.VITE_FIREBASE_API_KEY }}
          ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}

      - name: Install system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y fakeroot dpkg rpm ruby-dev build-essential
          sudo gem install fpm --no-document
          fpm --version

      - name: Generate PNG icon
        run: |
          python3 << 'PYEOF'
          import os, struct, zlib
          def make_png(size):
              rows = []
              cx, cy = size // 2, size // 2
              r = size // 2 - 2
              sc = size / 256
              for y in range(size):
                  row = []
                  for x in range(size):
                      in_bg = abs(x - cx) < r - int(8 * sc) and abs(y - cy) < r - int(8 * sc)
                      ox = x - (cx - int(r * 0.5))
                      oy = y - (cy - int(r * 0.5))
                      s = sc
                      in_p = (int(20*s)<ox<int(36*s) and int(24*s)<oy<int(80*s)) or \
                             (int(20*s)<ox<int(60*s) and int(24*s)<oy<int(42*s)) or \
                             (int(44*s)<ox<int(60*s) and int(42*s)<oy<int(58*s))
                      in_f = (int(70*s)<ox<int(86*s) and int(24*s)<oy<int(80*s)) or \
                             (int(70*s)<ox<int(110*s) and int(24*s)<oy<int(38*s)) or \
                             (int(70*s)<ox<int(100*s) and int(50*s)<oy<int(58*s))
                      if in_bg:
                          if in_p:   row += [124, 108, 252, 255]
                          elif in_f: row += [200, 195, 255, 255]
                          else:      row += [13, 13, 18, 255]
                      else:          row += [0, 0, 0, 0]
                  rows.append(bytes(row))
              def chunk(name, data):
                  crc = zlib.crc32(name + data) & 0xFFFFFFFF
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', crc)
              raw = b''.join(b'\x00' + r for r in rows)
              ihdr = struct.pack('>IIBBBBB', size, size, 8, 6, 0, 0, 0)
              return (b'\x89PNG\r\n\x1a\n' +
                      chunk(b'IHDR', ihdr) +
                      chunk(b'IDAT', zlib.compress(raw, 9)) +
                      chunk(b'IEND', b''))
          os.makedirs('electron/assets', exist_ok=True)
          with open('electron/assets/icon.png', 'wb') as f:
              f.write(make_png(512))
          print('icon.png generated')
          PYEOF

      - name: Install npm dependencies
        run: npm install

      - name: Create .env
        shell: bash
        run: |
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" > .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> .env

      - name: Build Vite
        run: npx vite build
        env:
          NODE_ENV: Build
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Build AppImage
        run: npx electron-builder --linux AppImage --${{ matrix.eb_arch }} --publish never

      - name: Build deb
        run: USE_SYSTEM_FPM=true npx electron-builder --linux deb --${{ matrix.eb_arch }} --publish never

      - name: Build rpm (x86-64 only)
        if: matrix.arch == 'x86-64'
        run: USE_SYSTEM_FPM=true npx electron-builder --linux rpm --x64 --publish never

      - name: List dist-electron
        run: ls -lh dist-electron/

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          VERSION=$(node -p "require('./package.json').version")
          arch="${{ matrix.arch == 'x86-64' && 'x86_64' || 'arm64' }}"
          find dist-electron -maxdepth 1 -name "*.AppImage" -exec cp {} "release-artifacts/PromptFlow-${VERSION}-${arch}.AppImage" \;
          find dist-electron -maxdepth 1 -name "*.deb"      -exec cp {} "release-artifacts/PromptFlow-${VERSION}-${arch}.deb" \;
          if [ "${{ matrix.arch }}" = "x86-64" ]; then
            find dist-electron -maxdepth 1 -name "*.rpm" -exec cp {} "release-artifacts/PromptFlow-${VERSION}-x86_64.rpm" \;
          fi
          ls -lh release-artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: release-artifacts/*
          retention-days: 7

  build-windows:
    name: Windows (${{ matrix.arch }})
    runs-on: windows-latest
    environment: Build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
          - arch: arm64
          - arch: ia32

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check Secrets
        shell: bash
        run: |
          echo "Checking secret presence (lengths only)..."
          echo "API_KEY length: ${#VAL}"
          echo "PROJECT_ID length: ${#ID}"
        env:
          VAL: ${{ secrets.VITE_FIREBASE_API_KEY }}
          ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}

      - name: Generate icon.ico
        shell: python
        run: |
          import os, struct, zlib

          def make_png(size):
              rows = []
              cx, cy = size // 2, size // 2
              r = size // 2 - 2
              sc = size / 256
              for y in range(size):
                  row = []
                  for x in range(size):
                      in_bg = abs(x - cx) < r - int(8 * sc) and abs(y - cy) < r - int(8 * sc)
                      ox = x - (cx - int(r * 0.5))
                      oy = y - (cy - int(r * 0.5))
                      s = sc
                      in_p = (int(20*s)<ox<int(36*s) and int(24*s)<oy<int(80*s)) or \
                             (int(20*s)<ox<int(60*s) and int(24*s)<oy<int(42*s)) or \
                             (int(44*s)<ox<int(60*s) and int(42*s)<oy<int(58*s))
                      in_f = (int(70*s)<ox<int(86*s) and int(24*s)<oy<int(80*s)) or \
                             (int(70*s)<ox<int(110*s) and int(24*s)<oy<int(38*s)) or \
                             (int(70*s)<ox<int(100*s) and int(50*s)<oy<int(58*s))
                      if in_bg:
                          if in_p:   row += [124, 108, 252, 255]
                          elif in_f: row += [200, 195, 255, 255]
                          else:      row += [13, 13, 18, 255]
                      else:          row += [0, 0, 0, 0]
                  rows.append(bytes(row))
              def chunk(name, data):
                  crc = zlib.crc32(name + data) & 0xFFFFFFFF
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', crc)
              raw = b''.join(b'\x00' + r for r in rows)
              ihdr = struct.pack('>IIBBBBB', size, size, 8, 6, 0, 0, 0)
              return (b'\x89PNG\r\n\x1a\n' +
                      chunk(b'IHDR', ihdr) +
                      chunk(b'IDAT', zlib.compress(raw, 9)) +
                      chunk(b'IEND', b''))

          def make_ico(sizes):
              pngs = [(s, make_png(s)) for s in sizes]
              count = len(pngs)
              header = struct.pack('<HHH', 0, 1, count)
              dir_offset = 6 + count * 16
              entries = b''
              images = b''
              offset = dir_offset
              for size, data in pngs:
                  w = size if size < 256 else 0
                  entries += struct.pack('<BBBBHHII', w, w, 0, 0, 1, 32, len(data), offset)
                  images += data
                  offset += len(data)
              return header + entries + images

          os.makedirs('electron/assets', exist_ok=True)
          with open('electron/assets/icon.ico', 'wb') as f:
              f.write(make_ico([16, 32, 48, 256]))
          with open('electron/assets/icon.png', 'wb') as f:
              f.write(make_png(512))
          print('Icons generated successfully')

      - name: Install npm dependencies
        run: npm install

      - name: Create .env
        shell: bash
        run: |
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" > .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> .env

      - name: Build Vite
        run: npx vite build
        env:
          NODE_ENV: Build
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Build NSIS installer
        run: npx electron-builder --win nsis --${{ matrix.arch }} --publish never

      - name: List dist-electron
        shell: pwsh
        run: Get-ChildItem dist-electron\ | Format-Table Name, Length

      - name: Collect artifact
        shell: bash
        run: |
          mkdir -p release-artifacts
          VERSION=$(node -p "require('./package.json').version")
          find dist-electron -maxdepth 1 -name "*.exe" \
            -exec cp {} "release-artifacts/PromptFlow-${VERSION}-${{ matrix.arch }}.exe" \;
          ls -lh release-artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: release-artifacts/*.exe
          retention-days: 7

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release files
        run: ls -lh release-artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          name: PromptFlow Studio ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}