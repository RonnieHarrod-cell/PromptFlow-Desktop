name: Build PromptFlow Studio

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:

  build-linux:
    name: Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86-64
            runner: ubuntu-22.04
            eb_arch: x64
          - arch: arm64
            runner: ubuntu-22.04-arm
            eb_arch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Node & npm versions
        run: node --version && npm --version

      - name: Install Linux packaging deps
        run: sudo apt-get update -y && sudo apt-get install -y rpm fakeroot dpkg

      - name: Install dependencies
        run: npm install

      - name: Build Vite bundle
        run: npm run build
        env:
          NODE_ENV: production

      - name: Build AppImage + deb
        run: npx electron-builder --linux AppImage deb --${{ matrix.eb_arch }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build rpm (x86-64 only)
        if: matrix.arch == 'x86-64'
        run: npx electron-builder --linux rpm --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List output
        run: ls -lh dist-electron/

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          arch=${{ matrix.arch == 'x86-64' && 'amd64' || 'arm64' }}
          find dist-electron -maxdepth 1 -name "*.AppImage" -exec cp {} release-artifacts/PromptFlow-main-${arch}.AppImage \;
          find dist-electron -maxdepth 1 -name "*.deb"      -exec cp {} release-artifacts/PromptFlow-main-${arch}.deb \;
          if [ "${{ matrix.arch }}" = "x86-64" ]; then
            find dist-electron -maxdepth 1 -name "*.rpm" -exec cp {} release-artifacts/PromptFlow-main-x86_64.rpm \;
          fi
          ls -lh release-artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: release-artifacts/*
          retention-days: 7

  build-windows:
    name: Windows (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            filename: PromptFlow-Setup-main-x64.exe
          - arch: arm64
            filename: PromptFlow-Setup-main-arm64.exe
          - arch: ia32
            filename: PromptFlow-Setup-main-ia32.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Node & npm versions
        run: node --version && npm --version

      - name: Install dependencies
        run: npm install

      - name: Build Vite bundle
        run: npm run build
        env:
          NODE_ENV: production

      - name: Build NSIS installer
        run: npx electron-builder --win nsis --${{ matrix.arch }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List output
        run: Get-ChildItem dist-electron\ | Format-Table Name, Length
        shell: pwsh

      - name: Collect artifact
        shell: bash
        run: |
          mkdir -p release-artifacts
          find dist-electron -maxdepth 1 -name "*.exe" -exec cp {} release-artifacts/${{ matrix.filename }} \;
          ls -lh release-artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: release-artifacts/${{ matrix.filename }}
          retention-days: 7

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - run: ls -lh release-artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          name: PromptFlow Studio ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}