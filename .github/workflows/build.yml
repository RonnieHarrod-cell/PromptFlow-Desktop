name: Build PromptFlow Studio

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to upload release assets

jobs:

  # ─────────────────────────────────────────────
  # Linux — x86-64: AppImage + .deb + .rpm
  # Linux — ARM64:  AppImage + .deb
  # ─────────────────────────────────────────────
  build-linux:
    name: Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86-64
            runner: ubuntu-22.04
            eb_arch: x64
          - arch: arm64
            runner: ubuntu-22.04-arm
            eb_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          

      - name: Install dependencies
        run: npm install

      - name: Install Linux packaging deps (x86-64 only)
        if: matrix.arch == 'x86-64'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y rpm

      - name: Build Vite bundle
        run: npm run build

      - name: Build Electron — AppImage + deb (both arches)
        run: |
          npx electron-builder \
            --linux AppImage deb \
            --${{ matrix.eb_arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron — rpm (x86-64 only)
        if: matrix.arch == 'x86-64'
        run: |
          npx electron-builder \
            --linux rpm \
            --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename artifacts to match release naming convention
        run: |
          mkdir -p release-artifacts
          arch=${{ matrix.arch == 'x86-64' && 'amd64' || 'arm64' }}

          # AppImage
          find dist-electron -name "*.AppImage" -exec \
            cp {} release-artifacts/PromptFlow-main-${arch}.AppImage \;

          # .deb
          find dist-electron -name "*.deb" -exec \
            cp {} release-artifacts/PromptFlow-main-${arch}.deb \;

          # .rpm (x86-64 only)
          if [ "${{ matrix.arch }}" = "x86-64" ]; then
            find dist-electron -name "*.rpm" -exec \
              cp {} release-artifacts/PromptFlow-main-x86_64.rpm \;
          fi

          ls -lh release-artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: release-artifacts/*
          retention-days: 7

  # ─────────────────────────────────────────────
  # Windows — x64 .exe + ARM64 .exe + ia32 .exe
  # ─────────────────────────────────────────────
  build-windows:
    name: Windows (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            label: x64
            filename: PromptFlow-Setup-main-x64.exe
          - arch: arm64
            label: arm64
            filename: PromptFlow-Setup-main-arm64.exe
          - arch: ia32
            label: ia32
            filename: PromptFlow-Setup-main-ia32.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          

      - name: Install dependencies
        run: npm install

      - name: Build Vite bundle
        run: npm run build

      - name: Build Electron NSIS installer
        run: |
          npx electron-builder --win nsis --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p release-artifacts
          find dist-electron -name "*.exe" -exec \
            cp {} release-artifacts/${{ matrix.filename }} \;
          ls -lh release-artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: release-artifacts/${{ matrix.filename }}
          retention-days: 7

  # ─────────────────────────────────────────────
  # GitHub Release — only on version tags (v*)
  # ─────────────────────────────────────────────
  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release files
        run: ls -lh release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PromptFlow Studio ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}